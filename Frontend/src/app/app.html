<div class="shell">
  <header class="top">
    <div class="tw-container top-inner">
      <a routerLink="/inicio" class="brand">
        <span class="brand-mark">◇</span>
        TripWise
      </a>
      <nav class="nav">
        <a routerLink="/inicio" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
        <a routerLink="/explorar" routerLinkActive="active">Destinos</a>
        <a routerLink="/planes" routerLinkActive="active">Mis planes</a>
      </nav>
      <div class="auth">
        @if (authSvc.user(); as u) {
          <span class="greet">Hola, {{ u.name }}</span>
          <button type="button" class="tw-btn tw-btn--ghost" (click)="logout()">Salir</button>
        } @else {
          <a routerLink="/entrar" class="tw-btn tw-btn--ghost">Entrar</a>
          <a routerLink="/registro" class="tw-btn">Crear cuenta</a>
        }
      </div>
    </div>
  </header>
  <main class="main">
    <router-outlet />
  </main>
  <footer class="foot">
    <div class="tw-container foot-inner">
      <span>TripWise — planifica con tu presupuesto real.</span>
      <span class="tw-muted">Vuelos (FlightAPI), ciudades (GeoDB), lugares (OpenTripMap).</span>
    </div>
  </footer>
</div>
